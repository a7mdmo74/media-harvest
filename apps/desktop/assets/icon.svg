<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
  
  <!-- Inner dark circle for depth -->
  <circle cx="128" cy="128" r="110" fill="#1F2937" opacity="0.9"/>
  
  <!-- Download arrow symbol -->
  <g transform="translate(128, 128)">
    <!-- Arrow shaft -->
    <rect x="-8" y="-20" width="16" height="40" fill="url(#playGradient)" rx="2"/>
    
    <!-- Arrow head -->
    <path d="M -20 -10 L 0 -30 L 20 -10 L 10 -10 L 10 10 L -10 10 L -10 -10 Z" fill="url(#playGradient)"/>
    
    <!-- Media film strip decoration -->
    <rect x="-30" y="-40" width="60" height="8" fill="#DC2626" opacity="0.8" rx="1"/>
    <rect x="-30" y="32" width="60" height="8" fill="#DC2626" opacity="0.8" rx="1"/>
    
    <!-- Film holes -->
    <circle cx="-20" cy="-36" r="2" fill="#1F2937"/>
    <circle cx="-10" cy="-36" r="2" fill="#1F2937"/>
    <circle cx="0" cy="-36" r="2" fill="#1F2937"/>
    <circle cx="10" cy="-36" r="2" fill="#1F2937"/>
    <circle cx="20" cy="-36" r="2" fill="#1F2937"/>
    
    <circle cx="-20" cy="36" r="2" fill="#1F2937"/>
    <circle cx="-10" cy="36" r="2" fill="#1F2937"/>
    <circle cx="0" cy="36" r="2" fill="#1F2937"/>
    <circle cx="10" cy="36" r="2" fill="#1F2937"/>
    <circle cx="20" cy="36" r="2" fill="#1F2937"/>
  </g>
  
  <!-- Subtle highlight -->
  <ellipse cx="128" cy="80" rx="60" ry="30" fill="white" opacity="0.1"/>
</svg>
